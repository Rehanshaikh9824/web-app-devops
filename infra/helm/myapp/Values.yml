# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/devops-webapp
  tag: latest
  pullPolicy: Always

# ── Replicas ──────────────────────────────────────────────────────────────────
replicaCount: 2

# ── Environment ───────────────────────────────────────────────────────────────
environment: production

env:
  APP_ENV: production
  PORT: "5000"

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: LoadBalancer
  port: 80
  targetPort: 5000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "alb"
  host: app.yourdomain.com
  tls: false

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Autoscaling ───────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /ready
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 10

# ── Deployment Strategy ───────────────────────────────────────────────────────
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Service Account ───────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: myapp-sa

# ── Node Selector ─────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - myapp
          topologyKey: kubernetes.io/hostname
